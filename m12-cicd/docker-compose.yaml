# Local full-stack: the app plus its data + messaging dependencies.
# Run: docker compose up --build   (or `docker-compose` v1)
services:
  customer-api:
    build:
      context: .
      args:
        VERSION: local
    ports:
      - "8080:8080"
    environment:
      PULSE_PG_DSN: postgres://pulse:pulse@postgres:5432/pulse?sslmode=disable
      PULSE_MONGO_URI: mongodb://mongo:27017
      PULSE_NATS_URL: nats://nats:4222
    depends_on:
      postgres: { condition: service_healthy }
      mongo: { condition: service_started }
      nats: { condition: service_started }

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse
      POSTGRES_DB: pulse
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    ports: ["27017:27017"]

  nats:
    image: nats:2-alpine
    command: ["-js"]
    ports: ["4222:4222"]
